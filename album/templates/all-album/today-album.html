{%extends 'all-album/base.html'%}
{% block content %} 
{{ block.super}}
  {% for album_item in album %}

  <div class="container"></div>

  <div class="row">

    <div class="col-xs-2 col-sm-2 col-md-2 col-lg-2">
      <h2 class="text-center"> {{ album_item.title }} </h2>
    </div>

    <div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">
        <img src="{{album_item.article_image.url}}" class="img-responsive" alt="Image">
      </div>

  {% empty %}
  <div class="row">
    <h2 class="text-center">There No Items</h2>
  </div>
  {% endfor %}
{% endblock %}
